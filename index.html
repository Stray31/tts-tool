<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TTS-Tool</title>

  <style>
    :root {
      --bg: #f4f4f5;
      --bg2: #e9e9ee;
      --glass: rgba(255, 255, 255, 0.45);
      --text: #111111;
      --subtle: #6b7280;
      --border: rgba(0, 0, 0, 0.08);
      --focus: #111111;
    }

    body.dark {
      --bg: #0b0b0d;
      --glass: rgba(22, 22, 24, 0.55);
      --text: #f5f5f5;
      --subtle: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --focus: #ffffff;
      background: radial-gradient(circle at top, #121214 0%, #0b0b0d 60%, #070709 100%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #ffffff 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, #f3f4f6 0%, transparent 55%),
        radial-gradient(circle at top, #ffffff, var(--bg) 40%, var(--bg2));
      transition: 0.3s ease;
    }

    body.dark {
      --bg: #0a0a0c;
      --bg2: #0d0d10;
    }

    /* GLASS CONTAINER */
    .container {
      max-width: 680px;
      margin: 40px auto;
      padding: 20px;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
    }

    /* GLASS CARD */
    .card {
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 14px;
      transition: 0.25s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .card:hover {
      transform: translateY(-2px);
    }

    /* FLOATING INPUT */
    .field {
      position: relative;
      margin-bottom: 30px;
      margin-top: 10px;
    }

    .field input {
      width: 100%;
      padding: 16px 12px 12px;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.25);
      color: var(--text);
      outline: none;
      transition: 0.2s ease;
    }

    body.dark .field input {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .field input:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.08);
    }

    .field label {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--subtle);
      pointer-events: none;
      background: transparent;
      padding: 0 6px;
      transition: 0.2s ease;
    }

    .field input:focus + label,
    .field input:not(:placeholder-shown) + label {
      top: -8px;
      font-size: 11px;
      color: var(--text);
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-radius: 6px;
    }

    /* BUTTONS */
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      justify-content: space-between;
      align-items: center;
    }

    button {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--glass);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      transition: 0.2s ease;
      backdrop-filter: blur(10px);
    }

    body.dark button {
      border-color: rgba(255, 255, 255, 0.12);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button.primary {
      background: var(--text);
      color: var(--bg);
      border: none;
    }

    /* OUTPUT */
    textarea {
      width: 100%;
      height: 110px;
      margin-top: 14px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(14px);
      color: var(--text);
      font-size: 13px;
    }

    body.dark textarea {
      border-color: rgba(255, 255, 255, 0.12);
    }

    textarea::-webkit-scrollbar {
      width: 6px;
    }

    textarea::-webkit-scrollbar-track {
      background: transparent;
    }

    textarea::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 3px;
    }

    body.dark textarea::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
    }

    html {
      scroll-behavior: smooth;
    }

    /* NEUTRAL ATTENTION STATE (non-ok fields) */
    .attention {
      border-color: rgba(120, 120, 120, 0.35) !important;
      border-radius: 10px;
      transition: 0.2s ease;
    }

    /* LIGHT MODE */
    body:not(.dark) .attention {
      background: rgba(120, 120, 120, 0.10) !important;
      box-shadow: 0 0 0 3px rgba(120, 120, 120, 0.12) !important;
    }

    /* DARK MODE (IMPORTANT FIX) */
    body.dark .attention {
      background: rgba(99, 102, 241, 0.1) !important;
      /* subtle indigo tint */
      border-color: rgba(99, 102, 241, 0.35) !important;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12) !important;
    }

    .attention {
      animation: attentionFade 0.35s ease;
    }

    @keyframes attentionFade {
      from {
        transform: scale(1.01);
        background: rgba(120, 120, 120, 0.0);
      }
      to {
        transform: scale(1);
        background: rgba(120, 120, 120, 0.10);
      }
    }

    /* CUSTOM ALERT MODAL */
    .custom-alert {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(2px);
    }

    body.dark .custom-alert {
      background: rgba(0, 0, 0, 0.35);
    }

    .custom-alert.show {
      opacity: 1;
      pointer-events: auto;
    }

    .custom-alert-content {
      background: var(--glass);
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: alertSlideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      backdrop-filter: blur(14px);
    }

    @keyframes alertSlideUp {
      from {
        transform: scale(0.8) translateY(40px);
        opacity: 0;
      }
      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    .custom-alert-icon {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .custom-alert-icon svg {
      width: 56px;
      height: 56px;
      stroke: currentColor;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: swooshCheck 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes swooshCheck {
      to {
        stroke-dashoffset: 0;
      }
    }

    .custom-alert-text {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      text-align: center;
      letter-spacing: 0.3px;
    }

    /* FIELD WITH INLINE DROPDOWN BUTTON */
    .field {
      position: relative;
    }

    .field-dropdown-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      padding: 4px 6px;
      transition: 0.2s ease;
    }

    .field-dropdown-btn:hover {
      transform: translateY(-50%) scale(1.2);
    }

    .field-dropdown-menu {
      position: absolute;
      top: 100%;
      right: 0;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-top: 4px;
      z-index: 1000;
      min-width: 150px;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(14px);
      display: none;
    }

    .field-dropdown-menu::-webkit-scrollbar {
      width: 6px;
    }

    .field-dropdown-menu::-webkit-scrollbar-track {
      background: transparent;
    }

    .field-dropdown-menu::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 3px;
    }

    body.dark .field-dropdown-menu::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
    }

    .field-dropdown-menu.show {
      display: block;
    }

    .field-dropdown-menu button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      border: none;
      background: none;
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      transition: 0.15s ease;
    }

    .field-dropdown-menu button:hover {
      background: rgba(0, 0, 0, 0.1);
    }

    body.dark .field-dropdown-menu button:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .field input {
      padding-right: 40px;
    }

    /* COMMENTS SIDEBAR */
    .comments-sidebar {
      position: fixed;
      right: -400px;
      top: 0;
      width: 380px;
      height: 100vh;
      background: var(--glass);
      backdrop-filter: blur(14px);
      border-left: 1px solid var(--border);
      padding: 20px;
      z-index: 9998;
      overflow-y: auto;
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -10px 0 30px rgba(0, 0, 0, 0.1);
    }

    .comments-sidebar.show {
      right: 0;
    }

    .comments-sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 600;
    }

    .comments-sidebar-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: 0.2s ease;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .comments-sidebar-close:hover {
      background: rgba(0, 0, 0, 0.1);
    }

    body.dark .comments-sidebar-close:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    #commentsBox {
      height: auto !important;
      min-height: 100px;
      max-height: 150px;
      resize: vertical;
    }

    /* COMMENTS TOGGLE BUTTON */
    .comments-toggle-btn {
      position: fixed;
      right: 20px;
      top: 20px;
      z-index: 9997;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--text);
      color: var(--bg);
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s ease;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .comments-toggle-btn:hover {
      transform: scale(1.1);
    }

    /* STICKY TEXTBOX BELOW COMMENTS */
    .sticky-notes {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 300px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      z-index: 9996;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(14px);
      user-select: none;
    }

    .sticky-notes textarea {
      width: 100%;
      height: 100px;
      margin: 0 !important;
      padding: 8px !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1) !important;
      color: var(--text) !important;
      font-size: 11px !important;
      resize: vertical;
    }

    .sticky-notes-title {
      font-size: 11px;
      color: var(--subtle);
      margin-bottom: 8px;
      font-weight: 600;
      cursor: move;
      padding: 4px;
      border-radius: 4px;
      transition: 0.2s ease;
    }

    .sticky-notes-title:hover {
      background: rgba(0, 0, 0, 0.1);
    }

    body.dark .sticky-notes-title:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* RESULTS COUNTER TOP RIGHT */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .results-counter {
      display: flex;
      gap: 14px;
      font-size: 12px;
    }

    /* SETTINGS SIDEBAR */
    .settings-sidebar {
      position: fixed;
      left: -450px;
      top: 0;
      width: 430px;
      height: 100vh;
      background: var(--glass);
      backdrop-filter: blur(14px);
      border-right: 1px solid var(--border);
      z-index: 9998;
      transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 10px 0 30px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
    }

    #settingsContent {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    #settingsContent::-webkit-scrollbar {
      width: 6px;
    }

    #settingsContent::-webkit-scrollbar-track {
      background: transparent;
    }

    #settingsContent::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 3px;
    }

    body.dark #settingsContent::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
    }

    .settings-sidebar.show {
      left: 0;
    }

    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 600;
      padding: 20px 20px 0;
    }

    .settings-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: 0.2s ease;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-close:hover {
      background: rgba(0, 0, 0, 0.1);
    }

    body.dark .settings-close:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .field-settings {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .field-settings-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .option-item {
      display: flex;
      gap: 6px;
      align-items: center;
      background: rgba(0, 0, 0, 0.05);
      padding: 8px;
      border-radius: 6px;
    }

    body.dark .option-item {
      background: rgba(255, 255, 255, 0.05);
    }

    .option-item input {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 11px;
      padding: 4px;
      outline: none;
    }

    .option-item button {
      padding: 4px 8px;
      font-size: 10px;
      border-radius: 4px;
    }

    .add-option-input {
      width: 100%;
      padding: 8px;
      font-size: 11px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      margin-bottom: 8px;
    }

    .add-option-btn {
      width: 100%;
      padding: 6px;
      font-size: 11px;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    /* SETTINGS TOGGLE BUTTON */
    .settings-toggle-btn {
      position: fixed;
      left: 20px;
      top: 20px;
      z-index: 9997;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--text);
      color: var(--bg);
      border: none;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s ease;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .settings-toggle-btn:hover {
      transform: scale(1.1);
    }

    .settings-buttons {
      display: flex;
      gap: 8px;
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(14px);
      flex-shrink: 0;
    }

    .settings-buttons button {
      flex: 1;
      padding: 8px;
      font-size: 11px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <h1>TTS-Tool for my Baby</h1>
      <button id="theme">Dark Mode</button>
    </div>

    <div class="card" id="form"></div>

    <div class="buttons">
      <div style="display: flex; gap: 10px;">
        <button class="primary" id="generate">Done</button>
        <button id="clear">Clear</button>
      </div>
      <button id="copy">Copy</button>
    </div>

    <div class="results-header" style="margin-top: 14px;">
      <div style="font-size:13px;color:var(--subtle);">
        Marked as Red
      </div>
      <div class="results-counter">
        <div style="display: flex; align-items: center; gap: 6px;">
          <span style="color: #ef4444;">●</span>
          <span>Red: <strong id="notOkCount">0</strong></span>
        </div>
        <div style="display: flex; align-items: center; gap: 6px;">
          <span style="color: #22c55e;">●</span>
          <span>Green: <strong id="okCount">0</strong></span>
        </div>
      </div>
    </div>

    <textarea id="output"></textarea>

    <div style="font-size:13px;color:var(--subtle);margin-bottom:8px;margin-top:14px;">
      Marked as Green
    </div>

    <textarea id="okFields" readonly></textarea>

  </div>

  <!-- CUSTOM ALERT MODAL -->
  <div id="customAlert" class="custom-alert">
    <div class="custom-alert-content">
      <div class="custom-alert-icon">
        <svg viewBox="0 0 24 24">
          <path d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <div class="custom-alert-text">Comments saved!</div>
    </div>
  </div>

  <!-- SETTINGS BUTTON -->
  <button class="settings-toggle-btn" id="settingsToggle">⚙️</button>

  <!-- SETTINGS SIDEBAR -->
  <div class="settings-sidebar" id="settingsSidebar">
    <div class="settings-header">
      <span>Edit Dropdown Options</span>
      <button class="settings-close" id="settingsClose">✕</button>
    </div>
    <div id="settingsContent"></div>
    <div class="settings-buttons">
      <button id="saveSettings">Save All</button>
      <button id="resetSettings">Reset</button>
    </div>
  </div>

  <!-- COMMENTS SIDEBAR -->
  <button class="comments-toggle-btn" id="commentsToggle">📝</button>
  <div class="comments-sidebar" id="commentsSidebar">
    <div class="comments-sidebar-header">
      <span>Comments Library</span>
      <button class="comments-sidebar-close" id="commentsClose">✕</button>
    </div>
    <textarea id="commentsBox" placeholder="Add your comments here..."></textarea>
    <div class="buttons" style="margin-top: 10px;">
      <button id="saveComments">Save</button>
      <button id="resetComments">Clear</button>
    </div>
  </div>

  <!-- STICKY NOTES -->
  <div class="sticky-notes">
    <div class="sticky-notes-title">Quick Notes</div>
    <textarea id="quickNotes" placeholder="Temporary notes..."></textarea>
  </div>

      inputs.forEach((i, idx) => {
        if (saved.main?.[idx]) i.value = saved.main[idx];
      });

      inputs[0]?.focus();
    });

    fields.forEach((field, index) => {
      const wrapper = document.createElement("div");
      wrapper.className = "field";

        if (e.key === "Enter") {

          e.preventDefault();
          inputs[index - 1]?.focus();
        }
      });
      input.addEventListener("focus", () => {
        setTimeout(() => {
          input.scrollIntoView({
            behavior: "smooth",
            block: "center"
          });
        }, 80);
      });

      // Create dropdown button
      const dropdownBtn = document.createElement("button");
      dropdownBtn.className = "field-dropdown-btn";
      dropdownBtn.textContent = "▼";
      dropdownBtn.type = "button";
      dropdownBtn.setAttribute("data-dropdown-index", index);

      // Create dropdown menu
      const dropdownMenu = document.createElement("div");
      dropdownMenu.className = "field-dropdown-menu";
      dropdownMenu.setAttribute("id", `dropdown-menu-${index}`);

      const placeholders = fieldOptions[index] || ["Option 1", "Option 2", "Option 3"];
      placeholders.forEach(ph => {
        const option = document.createElement("button");
        option.type = "button";
        option.textContent = ph;
        option.addEventListener("click", (e) => {
          e.preventDefault();
          input.value = (input.value.trim() ? input.value + " " : "") + ph;
          input.dispatchEvent(new Event("input", { bubbles: true }));
          document.getElementById(`dropdown-menu-${index}`).classList.remove("show");
          input.focus();
        });
        dropdownMenu.appendChild(option);
      });

      dropdownBtn.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        document.getElementById(`dropdown-menu-${index}`).classList.toggle("show");
      });

      // Close menu when clicking outside
      document.addEventListener("click", (e) => {
        if (!wrapper.contains(e.target)) {
          document.getElementById(`dropdown-menu-${index}`).classList.remove("show");
        }
      });

      inputs.push(input);
      wrapper.appendChild(input);
      wrapper.appendChild(label);
      wrapper.appendChild(dropdownBtn);
      wrapper.appendChild(dropdownMenu);
      form.appendChild(wrapper);
    });

    function saveData() {
      const data = {
        main: inputs.map(i => i.value)
      };
      localStorage.setItem("qa-data", JSON.stringify(data));
    }

    function generate() {
      let result = "";
      let okList = "";
      let notOkCount = 0;
      let okCount = 0;

      inputs.forEach((input, i) => {
        const value = input.value.trim();

        // clear previous highlights first
        input.classList.remove("attention");

        if (value && value.toLowerCase() !== "ok") {
          result += `${fields[i]}: ${value}\n`;
          // highlight non-ok fields
          input.classList.add("attention");
          notOkCount++;
        } else if (value.toLowerCase() === "ok") {
          okList += `${fields[i]}\n`;
          okCount++;
        }
      });

      document.getElementById("output").value = result;
      document.getElementById("okFields").value = okList;
      document.getElementById("notOkCount").textContent = notOkCount;
      document.getElementById("okCount").textContent = okCount;
    }

    function clearFields() {
      inputs.forEach(i => i.classList.remove("attention"));
      inputs.forEach(i => i.value = "");
      localStorage.removeItem("qa-data");
      document.getElementById("output").value = "";
      document.getElementById("okFields").value = "";
      document.getElementById("notOkCount").textContent = "0";
      document.getElementById("okCount").textContent = "0";
      document.getElementById("quickNotes").value = "";

      inputs[0].focus();

      // ✅ scroll to top after reset
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }


    document.getElementById("theme").onclick = () => {
      document.body.classList.toggle("dark");
      document.getElementById("theme").textContent =
        document.body.classList.contains("dark") ? "Light Mode" : "Dark Mode";
    };

    document.getElementById("generate").onclick = generate;
    document.getElementById("clear").onclick = clearFields;
    document.getElementById("copy").onclick = () => {
      const output = document.getElementById("output");
      output.select();
      document.execCommand("copy");
      showCustomAlert("Results copied to clipboard!");
    };



    const commentsBox = document.getElementById("commentsBox");

    // LOAD
    window.addEventListener("load", () => {
      const saved = localStorage.getItem("comments-data");
      commentsBox.value = saved || "";
    });

    // SAVE
    document.getElementById("saveComments").onclick = () => {
      localStorage.setItem("comments-data", commentsBox.value);
      showCustomAlert("Comments saved!");
    };

    // RESET
    document.getElementById("resetComments").onclick = () => {
      commentsBox.value = "";
      localStorage.removeItem("comments-data");
    };

    // Custom Alert Function
    function showCustomAlert(message) {
      const alertEl = document.getElementById("customAlert");
      const textEl = alertEl.querySelector(".custom-alert-text");
      textEl.textContent = message;

      alertEl.classList.add("show");

      setTimeout(() => {
        alertEl.classList.remove("show");
      }, 1000);
    }

    // Comments Sidebar Toggle
    document.getElementById("commentsToggle").addEventListener("click", () => {
      document.getElementById("commentsSidebar").classList.toggle("show");
    });

    document.getElementById("commentsClose").addEventListener("click", () => {
      document.getElementById("commentsSidebar").classList.remove("show");
    });

    // Settings Panel Functionality
    function renderSettings() {
      const settingsContent = document.getElementById("settingsContent");
      settingsContent.innerHTML = "";

      fields.forEach((field, index) => {
        const fieldSettings = document.createElement("div");
        fieldSettings.className = "field-settings";
        fieldSettings.innerHTML = `<div class="field-settings-title">${field}</div><div class="options-list" id="options-${index}"></div>
          <input type="text" placeholder="New option..." class="add-option-input" id="newOption-${index}">
          <button class="add-option-btn" id="addBtn-${index}">+ Add Option</button>`;

        const optionsList = fieldSettings.querySelector(`#options-${index}`);
        fieldOptions[index].forEach((option, optIndex) => {
          const optionItem = document.createElement("div");
          optionItem.className = "option-item";
          optionItem.innerHTML = `<input type="text" value="${option}" data-field="${index}" data-option="${optIndex}" onchange="updateOption(${index}, ${optIndex}, this.value)">
            <button class="remove-option-btn" data-index="${index}" data-option="${optIndex}">Remove</button>`;
          optionsList.appendChild(optionItem);
        });

        settingsContent.appendChild(fieldSettings);

        // Attach event listeners
        document.getElementById(`addBtn-${index}`).addEventListener("click", (e) => {
          e.stopPropagation();
          addOption(index);
        });

        fieldSettings.querySelectorAll(".remove-option-btn").forEach(btn => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            removeOption(parseInt(btn.getAttribute("data-index")), parseInt(btn.getAttribute("data-option")));
          });
        });
      });
    }

    window.addOption = function(index) {
      const input = document.getElementById(`newOption-${index}`);
      const newOption = input.value.trim();
      if (newOption) {
        fieldOptions[index].push(newOption);
        input.value = "";
        renderSettings();
      }
    };

    window.removeOption = function(index, optIndex) {
      fieldOptions[index].splice(optIndex, 1);
      renderSettings();
    };

    window.updateOption = function(index, optIndex, newValue) {
      fieldOptions[index][optIndex] = newValue;
    };

    document.getElementById("settingsToggle").addEventListener("click", () => {
      document.getElementById("settingsSidebar").classList.toggle("show");
      if (document.getElementById("settingsSidebar").classList.contains("show")) {
        renderSettings();
      }
    });

    document.getElementById("settingsClose").addEventListener("click", () => {
      document.getElementById("settingsSidebar").classList.remove("show");
    });

    document.getElementById("saveSettings").addEventListener("click", () => {
      localStorage.setItem("field-options", JSON.stringify(fieldOptions));
      regenerateAllDropdowns();
      showCustomAlert("Settings saved!");
      document.getElementById("settingsSidebar").classList.remove("show");
    });

    document.getElementById("resetSettings").addEventListener("click", () => {
      fieldOptions = JSON.parse(JSON.stringify(defaultFieldOptions));
      localStorage.removeItem("field-options");
      regenerateAllDropdowns();
      showCustomAlert("Settings reset!");
      renderSettings();
    });

    // Regenerate dropdown menus after settings change
    function regenerateAllDropdowns() {
      inputs.forEach((input, index) => {
        const wrapper = input.parentElement;
        const oldMenu = wrapper.querySelector(".field-dropdown-menu");
        if (oldMenu) oldMenu.remove();

        const dropdownMenu = document.createElement("div");
        dropdownMenu.className = "field-dropdown-menu";
        dropdownMenu.setAttribute("id", `dropdown-menu-${index}`);

        const placeholders = fieldOptions[index] || ["Option 1", "Option 2", "Option 3"];
        placeholders.forEach(ph => {
          const option = document.createElement("button");
          option.type = "button";
          option.textContent = ph;
          option.addEventListener("click", (e) => {
            e.preventDefault();
            input.value = (input.value.trim() ? input.value + " " : "") + ph;
            input.dispatchEvent(new Event("input", { bubbles: true }));
            document.getElementById(`dropdown-menu-${index}`).classList.remove("show");
            input.focus();
          });
          dropdownMenu.appendChild(option);
        });

        wrapper.appendChild(dropdownMenu);
      });
    }

    // Close sidebars when clicking outside
    document.addEventListener("click", (e) => {
      const settingsSidebar = document.getElementById("settingsSidebar");
      const commentsSidebar = document.getElementById("commentsSidebar");
      const settingsToggle = document.getElementById("settingsToggle");
      const commentsToggle = document.getElementById("commentsToggle");

      // Only close if clicking outside the sidebar and not on the toggle button
      if (settingsSidebar.classList.contains("show") && !settingsSidebar.contains(e.target) && e.target !== settingsToggle && !settingsToggle.contains(e.target)) {
        settingsSidebar.classList.remove("show");
      }

      if (commentsSidebar.classList.contains("show") && !commentsSidebar.contains(e.target) && e.target !== commentsToggle && !commentsToggle.contains(e.target)) {
        commentsSidebar.classList.remove("show");
      }

      // Close all open dropdowns when clicking outside
      if (!e.target.classList.contains("field-dropdown-btn")) {
        document.querySelectorAll(".field-dropdown-menu.show").forEach(menu => {
          menu.classList.remove("show");
        });
      }
    });

    // Draggable Sticky Notes
    const stickyNotes = document.querySelector(".sticky-notes");
    const stickyTitle = document.querySelector(".sticky-notes-title");
    let isDragging = false;
    let offsetX = 0;
    let offsetY = 0;

    if (stickyTitle && stickyNotes) {
      stickyTitle.addEventListener("mousedown", (e) => {
        isDragging = true;
        const rect = stickyNotes.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        stickyNotes.style.cursor = "grabbing";
      });

      document.addEventListener("mousemove", (e) => {
        if (isDragging) {
          stickyNotes.style.left = (e.clientX - offsetX) + "px";
          stickyNotes.style.top = (e.clientY - offsetY) + "px";
          stickyNotes.style.bottom = "auto";
        }
      });

      document.addEventListener("mouseup", () => {
        isDragging = false;
        stickyNotes.style.cursor = "default";
      });
    }
  </script>

</body>
</html>
